<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Incidencias - Cendea de Galar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; min-height: 100vh; }
        .tabs { display: flex; border-bottom: 2px solid #ddd; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border: none; background: white; font-size: 14px; font-weight: 500; }
        .tab.active { background: #0066cc; color: white; }
        .content { padding: 1rem; }
        button { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; }
        .btn-primary { background: #0066cc; color: white; }
        .btn-success { background: #28a745; color: white; flex: 1; }
        .btn-danger { background: #dc3545; color: white; flex: 1; }
        .button-group { display: flex; gap: 10px; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('capture')">Capturar</div>
            <div class="tab" onclick="switchTab('dashboard')">Mis reportes</div>
        </div>

        <div class="content">
            <!-- CAPTURA -->
            <div id="capture">
                <h2>Capturar Incidencia</h2>
                <p>Aquí va el formulario de captura...</p>
            </div>

            <!-- MIS REPORTES -->
            <div id="dashboard" style="display: none;">
                <h2>Mis Reportes</h2>
                <div class="button-group">
                    <button class="btn-success" onclick="exportBackup()">💾 Backup</button>
                    <button class="btn-danger" onclick="clearAppCache()">🗑️ Limpiar</button>
                </div>
                <div id="incidents-list">
                    <p>Cargando incidencias...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.content > div').forEach(el => el.style.display = 'none');
            document.getElementById(tab).style.display = 'block';
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
        }

        function exportBackup() {
            alert('✓ Backup descargado');
        }

        function clearAppCache() {
            if (confirm('¿Limpiar caché?')) {
                alert('✓ Caché limpiado');
                location.reload();
            }
        }
    </script>
</body>
</html>
